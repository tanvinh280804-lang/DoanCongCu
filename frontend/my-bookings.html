<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking của tôi - Homestay Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">Homestay <span>Manager</span></a>
        <div class="navbar-links" id="nav-auth"></div>
    </nav>

    <div class="container">
        <h1 style="font-size:1.8rem; font-weight:800; margin-bottom:32px;">
            📋 Booking của tôi
        </h1>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Đang tải danh sách booking...</p>
        </div>

        <div id="bookings-list"></div>

        <div id="no-bookings" style="
            text-align:center; 
            padding:60px; 
            display:none;
            background:white;
            border-radius:12px;
            box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);
        ">
            <div style="font-size:4rem; margin-bottom:16px;">📭</div>
            <h2 style="font-weight:700; margin-bottom:8px;">Chưa có booking nào</h2>
            <p style="color:#64748b; margin-bottom:24px;">
                Bạn chưa đặt phòng nào. Hãy khám phá các phòng homestay!
            </p>
            <a href="index.html" class="btn btn-primary">Xem danh sách phòng</a>
        </div>
    </div>

    <!-- MODAL XÁC NHẬN HỦY -->
    <div id="cancel-modal" style="
        display:none;
        position:fixed;
        top:0; left:0;
        width:100%; height:100%;
        background:rgba(0,0,0,0.5);
        z-index:999;
        justify-content:center;
        align-items:center;
    ">
        <div style="
            background:white;
            border-radius:16px;
            padding:40px;
            max-width:420px;
            width:90%;
            text-align:center;
            box-shadow:0 20px 60px rgba(0,0,0,0.3);
        ">
            <div style="font-size:3.5rem; margin-bottom:16px;">⚠️</div>
            <h3 style="font-size:1.4rem; font-weight:700; margin-bottom:12px;">
                Xác nhận hủy booking
            </h3>
            <p style="color:#64748b; margin-bottom:8px;" id="cancel-modal-info"></p>
            <p style="color:#ef4444; font-size:0.9rem; margin-bottom:28px;">
                Hành động này không thể hoàn tác!
            </p>
            <div style="display:flex; gap:12px; justify-content:center;">
                <button class="btn btn-outline" onclick="closeModal()"
                    style="min-width:120px;">
                    Không hủy
                </button>
                <button class="btn btn-danger" onclick="confirmCancel()"
                    style="min-width:120px;" id="confirm-btn">
                    Xác nhận hủy
                </button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        requireLogin();
        updateNavbar();

        let cancelBookingId = null;

        async function loadMyBookings() {
            const bookings = await apiGetMyBookings();
            document.getElementById("loading").style.display = "none";

            if (!bookings || bookings.length === 0) {
                document.getElementById("no-bookings").style.display = "block";
                return;
            }

            const list = document.getElementById("bookings-list");
            list.innerHTML = bookings.map(b => `
                <div style="
                    background:white;
                    border-radius:12px;
                    padding:24px;
                    margin-bottom:16px;
                    box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);
                    border-left:4px solid ${b.status === 'confirmed' ? '#10b981' : b.status === 'cancelled' ? '#ef4444' : '#f59e0b'};
                ">
                    <div style="display:flex; justify-content:space-between; align-items:start; flex-wrap:wrap; gap:12px;">
                        <div>
                            <div style="font-size:1.1rem; font-weight:700; margin-bottom:8px;">
                                🏠 Phòng #${b.room_id}
                                <span style="font-size:0.85rem; color:#64748b; font-weight:400;">
                                    (Mã booking: #${b.id})
                                </span>
                            </div>
                            <div style="color:#64748b; margin-bottom:4px;">
                                👤 Khách: <strong>${b.guest_name || "N/A"}</strong> | 
                                📞 ${b.guest_phone || "N/A"}
                            </div>
                            <div style="color:#64748b; margin-bottom:4px;">
                                📅 Check-in: <strong>${formatDate(b.check_in)}</strong> → 
                                Check-out: <strong>${formatDate(b.check_out)}</strong>
                            </div>
                            <div style="font-size:1.1rem; font-weight:700; color:#2563eb;">
                                💰 ${b.total_price ? formatPrice(b.total_price) : "N/A"}
                            </div>
                        </div>
                        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
                            ${formatStatus(b.status)}
                            ${b.status === 'pending' ? `
                                <button class="btn btn-danger" 
                                    style="padding:8px 16px; font-size:0.85rem;"
                                    onclick="cancelBooking(${b.id}, ${b.room_id}, '${formatDate(b.check_in)}', '${formatDate(b.check_out)}')">
                                    Hủy booking
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join("");
        }

        function cancelBooking(bookingId, roomId, checkIn, checkOut) {
            cancelBookingId = bookingId;
            document.getElementById("cancel-modal-info").innerHTML = `
                Phòng #${roomId} | Check-in: <strong>${checkIn}</strong> → Check-out: <strong>${checkOut}</strong>
            `;
            document.getElementById("cancel-modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("cancel-modal").style.display = "none";
            cancelBookingId = null;
        }

        async function confirmCancel() {
            if (!cancelBookingId) return;

            const btn = document.getElementById("confirm-btn");
            btn.textContent = "Đang hủy...";
            btn.disabled = true;

            const data = await apiCancelBooking(cancelBookingId);

            if (data.message) {
                closeModal();
                await loadMyBookings();
            } else {
                btn.textContent = "Xác nhận hủy";
                btn.disabled = false;
                alert("Hủy booking thất bại!");
            }
        }

        // Đóng modal khi click ra ngoài
        document.getElementById("cancel-modal").addEventListener("click", function(e) {
            if (e.target === this) closeModal();
        });

        loadMyBookings();
    </script>
</body>
</html>
