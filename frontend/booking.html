<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt phòng - Homestay Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">Homestay <span>Manager</span></a>
        <div class="navbar-links" id="nav-auth"></div>
    </nav>

    <div class="container" style="max-width:800px">

        <!-- THÔNG TIN PHÒNG -->
        <div id="room-info" style="
            background:white; 
            border-radius:12px; 
            overflow:hidden;
            box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom:24px;
            display:none;
        ">
            <img id="room-image" src="" alt="" style="width:100%; height:250px; object-fit:cover;">
            <div style="padding:24px;">
                <h2 id="room-name" style="font-size:1.5rem; font-weight:700; margin-bottom:8px;"></h2>
                <p id="room-desc" style="color:#64748b; margin-bottom:12px;"></p>
                <div style="display:flex; gap:24px;">
                    <span id="room-price" style="font-size:1.3rem; font-weight:700; color:#2563eb;"></span>
                    <span id="room-capacity" style="color:#64748b;"></span>
                </div>
            </div>
        </div>

        <!-- FORM ĐẶT PHÒNG -->
        <div style="background:white; border-radius:12px; padding:32px; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);">
            <h2 style="font-size:1.5rem; font-weight:700; margin-bottom:24px;">Thông tin đặt phòng</h2>

            <div class="alert alert-error" id="error-msg"></div>
            <div class="alert alert-success" id="success-msg"></div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div class="form-group">
                    <label>Họ và tên khách</label>
                    <input type="text" id="guest-name" placeholder="Nguyễn Văn A">
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="text" id="guest-phone" placeholder="0901234567">
                </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div class="form-group">
                    <label>Ngày check-in</label>
                    <input type="date" id="check-in" onchange="updatePrice()">
                </div>
                <div class="form-group">
                    <label>Ngày check-out</label>
                    <input type="date" id="check-out" onchange="updatePrice()">
                </div>
            </div>

            <!-- TỔNG TIỀN -->
            <div id="price-summary" style="
                background:#eff6ff;
                border:2px solid #bfdbfe;
                border-radius:8px;
                padding:20px;
                margin-bottom:24px;
                display:none;
            ">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span style="color:#64748b;">Số đêm:</span>
                    <span id="nights-count" style="font-weight:600;"></span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span style="color:#64748b;">Giá mỗi đêm:</span>
                    <span id="price-per-night" style="font-weight:600;"></span>
                </div>
                <hr style="border:1px solid #bfdbfe; margin:12px 0;">
                <div style="display:flex; justify-content:space-between;">
                    <span style="font-weight:700; font-size:1.1rem;">Tổng tiền:</span>
                    <span id="total-price" style="font-weight:700; font-size:1.3rem; color:#2563eb;"></span>
                </div>
            </div>

            <button class="btn btn-primary btn-full" id="book-btn" onclick="submitBooking()">
                Xác nhận đặt phòng
            </button>

            <a href="index.html" style="
                display:block; 
                text-align:center; 
                margin-top:16px; 
                color:#64748b;
                text-decoration:none;
            ">← Quay lại danh sách phòng</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Bắt buộc phải đăng nhập mới đặt được
        requireLogin();
        updateNavbar();

        let currentRoom = null;

        // Lấy room_id từ URL và tải thông tin phòng
        async function loadRoom() {
            const roomId = getUrlParam("room_id");
            if (!roomId) {
                window.location.href = "index.html";
                return;
            }

            const room = await apiGetRoom(roomId);
            if (!room || room.detail) {
                window.location.href = "index.html";
                return;
            }

            currentRoom = room;

            // Hiển thị thông tin phòng
            document.getElementById("room-image").src = room.image_url || 
                "https://placehold.co/800x250?text=No+Image";
            document.getElementById("room-name").textContent = room.name;
            document.getElementById("room-desc").textContent = 
                room.description || "Phòng nghỉ thoải mái, đầy đủ tiện nghi";
            document.getElementById("room-price").textContent = 
                formatPrice(room.price) + " / đêm";
            document.getElementById("room-capacity").textContent = 
                "👥 Sức chứa: " + room.capacity + " người";
            document.getElementById("room-info").style.display = "block";

            // Set ngày tối thiểu là hôm nay
            const today = new Date().toISOString().split("T")[0];
            document.getElementById("check-in").min = today;
            document.getElementById("check-out").min = today;
        }

        // Tính tiền khi chọn ngày
        function updatePrice() {
            const checkIn = document.getElementById("check-in").value;
            const checkOut = document.getElementById("check-out").value;
            const summary = document.getElementById("price-summary");

            if (!checkIn || !checkOut || !currentRoom) {
                summary.style.display = "none";
                return;
            }

            if (!validateDateRange(checkIn, checkOut)) {
                summary.style.display = "none";
                showAlert("error-msg", "Ngày check-out phải sau ngày check-in", "error");
                return;
            }

            hideAlert("error-msg");

            const nights = calculateNights(checkIn, checkOut);
            const total = calculateTotal(checkIn, checkOut, currentRoom.price);

            document.getElementById("nights-count").textContent = nights + " đêm";
            document.getElementById("price-per-night").textContent = formatPrice(currentRoom.price);
            document.getElementById("total-price").textContent = formatPrice(total);
            summary.style.display = "block";
        }

        // Xác nhận đặt phòng
        async function submitBooking() {
            const guestName = document.getElementById("guest-name").value.trim();
            const guestPhone = document.getElementById("guest-phone").value.trim();
            const checkIn = document.getElementById("check-in").value;
            const checkOut = document.getElementById("check-out").value;

            // Kiểm tra thông tin
            if (!guestName || !guestPhone || !checkIn || !checkOut) {
                showAlert("error-msg", "Vui lòng nhập đầy đủ thông tin", "error");
                return;
            }

            if (!validatePhone(guestPhone)) {
                showAlert("error-msg", "Số điện thoại không hợp lệ (10-11 số)", "error");
                return;
            }

            if (!validateDateRange(checkIn, checkOut)) {
                showAlert("error-msg", "Ngày check-out phải sau ngày check-in", "error");
                return;
            }

            setLoading("book-btn", true, "Xác nhận đặt phòng");

            const data = await apiCreateBooking({
                room_id: currentRoom.id,
                check_in: checkIn,
                check_out: checkOut,
                guest_name: guestName,
                guest_phone: guestPhone
            });

            setLoading("book-btn", false, "Xác nhận đặt phòng");

            if (data.id) {
    // Ẩn form đặt phòng
    document.getElementById("book-btn").style.display = "none";
    document.getElementById("guest-name").disabled = true;
    document.getElementById("guest-phone").disabled = true;
    document.getElementById("check-in").disabled = true;
    document.getElementById("check-out").disabled = true;

    // Hiện thông báo thành công to rõ ràng
    const successBox = document.getElementById("success-msg");
    successBox.innerHTML = `
        <div style="text-align:center; padding:10px;">
            <div style="font-size:3rem; margin-bottom:12px;">🎉</div>
            <div style="font-size:1.2rem; font-weight:700; margin-bottom:8px;">
                Đặt phòng thành công!
            </div>
            <div style="margin-bottom:8px;">
                Mã booking: <strong>#${data.id}</strong>
            </div>
            <div style="margin-bottom:8px;">
                Phòng: <strong>${currentRoom.name}</strong>
            </div>
            <div style="margin-bottom:8px;">
                Check-in: <strong>${formatDate(data.check_in)}</strong> → 
                Check-out: <strong>${formatDate(data.check_out)}</strong>
            </div>
            <div style="font-size:1.1rem; color:#065f46; font-weight:700;">
                Tổng tiền: ${formatPrice(data.total_price)}
            </div>
            <div style="margin-top:12px; font-size:0.9rem; color:#065f46;">
                Chúng tôi sẽ liên hệ xác nhận sớm nhất!
            </div>
            <a href="index.html" class="btn btn-primary" 
                style="margin-top:16px; display:inline-block;">
                Quay lại trang chủ
            </a>
        </div>
    `;
    successBox.style.display = "block";
    // Cuộn lên đầu để thấy thông báo
    successBox.scrollIntoView({ behavior: "smooth" });
} else {
    showAlert("error-msg", data.detail || "Đặt phòng thất bại, vui lòng thử lại", "error");
}
        }

        loadRoom();
    </script>
</body>
</html>
