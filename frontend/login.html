<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Homestay Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">Homestay <span>Manager</span></a>
        <div class="navbar-links" id="nav-auth"></div>
    </nav>

    <!-- FORM ĐĂNG NHẬP -->
    <div class="form-container">
        <h2 class="form-title">Đăng nhập</h2>
        <p class="form-subtitle">Chào mừng bạn quay trở lại!</p>

        <div class="alert alert-error" id="error-msg"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="example@gmail.com">
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu">
        </div>

        <button class="btn btn-primary btn-full" onclick="submitLogin()">
            Đăng nhập
        </button>

        <div class="form-link">
            Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Nếu đã đăng nhập thì chuyển về trang chủ
        if (isLoggedIn()) {
            window.location.href = "index.html";
        }

        updateNavbar();

        async function submitLogin() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("error-msg");

            // Kiểm tra nhập đủ thông tin
            if (!email || !password) {
                errorMsg.textContent = "Vui lòng nhập đầy đủ email và mật khẩu";
                errorMsg.style.display = "block";
                return;
            }

            // Đổi text button khi đang xử lý
            const btn = document.querySelector(".btn-primary");
            btn.textContent = "Đang đăng nhập...";
            btn.disabled = true;

            const error = await handleLogin(email, password);

            if (error) {
                errorMsg.textContent = error;
                errorMsg.style.display = "block";
                btn.textContent = "Đăng nhập";
                btn.disabled = false;
            }
        }

        // Nhấn Enter để đăng nhập
        document.addEventListener("keypress", function(e) {
            if (e.key === "Enter") submitLogin();
        });
    </script>
</body>
</html>
