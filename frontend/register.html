<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Homestay Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">Homestay <span>Manager</span></a>
        <div class="navbar-links" id="nav-auth"></div>
    </nav>

    <!-- FORM ĐĂNG KÝ -->
    <div class="form-container">
        <h2 class="form-title">Đăng ký</h2>
        <p class="form-subtitle">Tạo tài khoản để đặt phòng ngay!</p>

        <div class="alert alert-error" id="error-msg"></div>
        <div class="alert alert-success" id="success-msg"></div>

        <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" id="fullname" placeholder="Nguyễn Văn A">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="example@gmail.com">
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Tối thiểu 6 ký tự">
        </div>

        <div class="form-group">
            <label>Xác nhận mật khẩu</label>
            <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu">
        </div>

        <button class="btn btn-primary btn-full" onclick="submitRegister()">
            Đăng ký
        </button>

        <div class="form-link">
            Đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (isLoggedIn()) {
            window.location.href = "index.html";
        }

        updateNavbar();

        async function submitRegister() {
            const fullname = document.getElementById("fullname").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm-password").value;
            const errorMsg = document.getElementById("error-msg");
            const successMsg = document.getElementById("success-msg");

            errorMsg.style.display = "none";
            successMsg.style.display = "none";

            if (!fullname || !email || !password) {
                errorMsg.textContent = "Vui lòng nhập đầy đủ thông tin";
                errorMsg.style.display = "block";
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = "Mật khẩu phải có ít nhất 6 ký tự";
                errorMsg.style.display = "block";
                return;
            }

            if (password !== confirmPassword) {
                errorMsg.textContent = "Mật khẩu xác nhận không khớp";
                errorMsg.style.display = "block";
                return;
            }

            const btn = document.querySelector(".btn-primary");
            btn.textContent = "Đang đăng ký...";
            btn.disabled = true;

            const error = await handleRegister(fullname, email, password);
            console.log("handleRegister result:", error);

            if (error) {
                errorMsg.textContent = error;
                errorMsg.style.display = "block";
                btn.textContent = "Đăng ký";
                btn.disabled = false;
            } else {
                console.log("Đăng ký thành công, chuẩn bị redirect...");
                successMsg.textContent = "Đăng ký thành công! Đang chuyển vào trang chủ...";
                successMsg.style.display = "block";
            }
        }

        document.addEventListener("keypress", function(e) {
            if (e.key === "Enter") submitRegister();
        });
    </script>
</body>
</html>
